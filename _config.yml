# Jekyll configuration

name: Covid-19 Statistics

url: https://eaglerainbow.github.io/covid19stats/
markdown: kramdown
#theme: jekyll-theme-minima
theme: minima

minima:
  date_format: "%Y-%m-%d"

# see also https://nicolas-van.github.io/easy-markdown-to-github-pages/

plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
include:
  - CONTRIBUTING.md
  - README.md
  - LICENSE.md
  - COPYING.md
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - ISSUE_TEMPLATE.md
  - PULL_REQUEST_TEMPLATE.md

